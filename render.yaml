# render.yaml - с новыми тарифными планами

# Определяем базы данных с новыми планами
databases:
  - name: fredi-db
    plan: basic                    # <-- новый план (вместо starter)
  - name: fredi-redis
    plan: basic                    # <-- для Redis тоже basic

services:
  # Backend (FastAPI)
  - type: web
    name: fredi-backend
    runtime: python
    repo: https://github.com/Dron939-sketch/Frederick
    plan: basic                    # <-- backend тоже basic
    branch: main
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fredi-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: fredi-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false

    disk:
      name: backend-tmp
      mountPath: /tmp
      sizeGB: 1
