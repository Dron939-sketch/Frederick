# Это файл описывает всю вашу инфраструктуру на Render [citation:2]
# Используйте этот код, заменив пути, если необходимо.

# Определяем базы данных, которые будут созданы автоматически [citation:2]
databases:
  - name: fredi-db
    plan: starter
  - name: fredi-redis
    plan: starter

# Определяем сервисы
services:
  # --- Backend (FastAPI) ---
  - type: web
    name: fredi-backend
    runtime: image                # <-- Используем Docker для надежности
    repo: https://github.com/Dron939-sketch/Frederick # Укажите ваш URL
    plan: starter
    dockerfilePath: ./backend/Dockerfile  # <-- Путь к вашему Dockerfile
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # Базы данных подключаются автоматически [citation:2][citation:7]
      - key: DATABASE_URL
        fromDatabase:
          name: fredi-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: fredi-redis
          property: connectionString

      # Переменные окружения для FastAPI
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info

      # Секретные ключи (значения нужно будет добавить вручную в панели Render)
      # sync: false означает, что Render не будет перезаписывать их из файла [citation:5]
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false

    disk:
      name: backend-tmp
      mountPath: /tmp
      sizeGB: 1

  # --- Frontend (Статический сайт) ---
  - type: static_site               # <-- Правильный тип для статики [citation:1][citation:6]
    name: fredi-frontend
    repo: https://github.com/Dron939-sketch/Frederick
    branch: main
    buildCommand: echo "No build needed"  # Если нет сложной сборки
    publishPath: ./frontend               # Папка с HTML/CSS/JS файлами
    # Если у вас есть package.json, команда может быть "npm install && npm run build", а publishPath: "./dist" [citation:1][citation:3]

    envVars:
      # Передаем URL бэкенда во фронтенд [citation:3][citation:7]
      - key: API_URL
        fromService:
          name: fredi-backend
          type: web
          property: url
        value: https://fredi-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      # Правило для SPA: все запросы перенаправляем на index.html [citation:3]
      - type: rewrite
        source: /*
        destination: /index.html
