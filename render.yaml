# render.yaml - ИСПРАВЛЕННАЯ ВЕРСИЯ
services:
  # 1. PostgreSQL база данных
  - type: postgresql
    name: fredi-db
    plan: starter
    region: frankfurt
    databaseName: fredi_db
    user: fredi_user
    ipAllowList: []
    backup:
      enabled: true
      schedule: "0 0 * * *"
    diskSizeGB: 10
    postgresMajorVersion: 15
    highAvailability:
      enabled: false

  # 2. Backend API (FastAPI)
  - type: web
    name: fredi-backend
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app \
        --host 0.0.0.0 \
        --port $PORT \
        --workers 2 \
        --loop uvloop \
        --http httptools \
        --timeout-keep-alive 65 \
        --limit-concurrency 100
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fredi-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: PYTHONOPTIMIZE
        value: "2"
      - key: UVICORN_WORKERS
        value: "2"
      - key: UVICORN_LIMIT_CONCURRENCY
        value: "100"
      # API ключи (добавить вручную)
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
    healthCheckPath: /health
    healthCheckTimeout: 100
    autoDeploy: true
    numInstances: 1
    scaling:
      minInstances: 1
      maxInstances: 2
      targetMemoryPercent: 70
      targetCPUPercent: 70
    disk:
      name: tmp
      mountPath: /tmp
      sizeGB: 1

  # 3. Redis (опционально)
  - type: redis
    name: fredi-redis
    plan: starter
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
    redisVersion: "7"

  # 4. Статический сайт (Frontend) - ИСПРАВЛЕНО: static_site
  - type: static_site
    name: fredi-frontend
    region: frankfurt
    buildCommand: |
      echo "Optimizing frontend..."
      if [ -f "frontend/package.json" ]; then
        cd frontend && npm install && npm run build
      fi
    publishPath: ./frontend
    envVars:
      - key: API_URL
        fromService:
          name: fredi-backend
          type: web
          property: url
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
