# render.yaml - без указания планов (выбираются вручную)

# Определяем базы данных (план выберем позже в интерфейсе)
databases:
  - name: fredi-db
  - name: fredi-redis

services:
  # Backend (FastAPI) - план выберем позже в интерфейсе
  - type: web
    name: fredi-backend
    runtime: python
    repo: https://github.com/Dron939-sketch/Frederick
    branch: main
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fredi-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: fredi-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: FREDDY_URL
        value: https://agent-ynlg.onrender.com
      - key: FREDDY_USERNAME
        sync: false
      - key: FREDDY_PASSWORD
        sync: false

    disk:
      name: backend-tmp
      mountPath: /tmp
      sizeGB: 1

  # Frontend (Static Site) — для fredium.ru
  - type: web
    name: fredi-frontend
    runtime: static
    repo: https://github.com/Dron939-sketch/Frederick
    branch: main
    buildCommand: echo "Static site ready"
    staticPublishPath: frontend
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /service_worker.js
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
