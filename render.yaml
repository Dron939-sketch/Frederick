# render.yaml - ТОЛЬКО BACKEND
services:
  # Backend API (FastAPI)
  - type: web
    name: fredi-backend
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app \
        --host 0.0.0.0 \
        --port $PORT \
        --workers 2 \
        --loop uvloop \
        --http httptools \
        --timeout-keep-alive 65 \
        --limit-concurrency 100
    envVars:
      # PostgreSQL - будет создана автоматически
      - key: DATABASE_URL
        fromDatabase:
          name: fredi-db
          property: connectionString
      # Redis - будет создан автоматически  
      - key: REDIS_URL
        fromDatabase:
          name: fredi-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: PYTHONOPTIMIZE
        value: "2"
      - key: UVICORN_WORKERS
        value: "2"
      - key: UVICORN_LIMIT_CONCURRENCY
        value: "100"
      # API ключи (добавить вручную после деплоя)
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
    healthCheckPath: /health
    healthCheckTimeout: 100
    autoDeploy: true
    numInstances: 1
    scaling:
      minInstances: 1
      maxInstances: 2
      targetMemoryPercent: 70
      targetCPUPercent: 70
    disk:
      name: tmp
      mountPath: /tmp
      sizeGB: 1
