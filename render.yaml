services:
  - type: web
    name: fredi-backend
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fredi-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: fredi-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
    healthCheckPath: /health
    healthCheckTimeout: 100
    autoDeploy: true
    numInstances: 1
    disk:
      name: tmp
      mountPath: /tmp
      sizeGB: 1
