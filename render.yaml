# render.yaml - ТОЛЬКО BACKEND (статический сайт создается отдельно)

# Определяем базы данных
databases:
  - name: fredi-db
    plan: starter
  - name: fredi-redis
    plan: starter

services:
  # Backend (FastAPI) - через Docker
  - type: web
    name: fredi-backend
    runtime: image
    repo: https://github.com/Dron939-sketch/Frederick
    plan: starter
    branch: main
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fredi-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: fredi-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false

    disk:
      name: backend-tmp
      mountPath: /tmp
      sizeGB: 1
