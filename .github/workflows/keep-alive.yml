name: Keep Render Alive

# Render free tier засыпает после 15 мин без запросов и стартует
# 30-60 сек после первого нового. Это убивает первые впечатления
# юзеров. Здесь — простой external ping каждые ~5 минут на /health
# (open endpoint, не требует auth-токена).

on:
  schedule:
    - cron: '*/5 * * * *'   # минимум для GitHub Actions = 5 минут
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend
        run: |
          set +e
          code=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 30 \
            "https://fredi-backend-flz2.onrender.com/health")
          echo "HTTP $code"
          head -c 300 /tmp/health.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::warning::Backend ping returned HTTP $code"
          fi
          # 200 — ok, 502/503 — Render запускает (нормально, через несколько минут будет 200)
          # ВАЖНО: не делаем exit 1 чтобы Actions не слал нам спам с failures
          exit 0
