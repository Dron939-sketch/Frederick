<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Фреди | Психологический профиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* Левое меню */
        .chats-panel {
            width: 280px;
            background: rgba(10, 10, 10, 0.95);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .chats-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chats-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chats-search {
            padding: 12px 16px;
        }

        .chats-search input {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: white;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .menu-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 12px 16px;
        }

        .menu-section-title {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            padding: 8px 20px;
            text-transform: uppercase;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .chat-item.active {
            background: rgba(255,107,59,0.15);
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 14px;
        }

        .chat-preview {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .chats-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .user-mini-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
        }

        .user-mini-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #0a0a0a;
        }

        /* Правая панель */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10,10,10,0.5);
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(10,10,10,0.8);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 18px;
        }

        .mode-indicator {
            width: 8px;
            height: 8px;
            background: #ff6b3b;
            border-radius: 50%;
        }

        .screen-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Контент страницы */
        .full-content-page {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 24px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .content-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .content-emoji {
            font-size: 48px;
        }

        .content-header h1 {
            font-size: 24px;
            margin-top: 10px;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content-body {
            line-height: 1.6;
            font-size: 15px;
            color: rgba(255,255,255,0.8);
        }

        .profile-section-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,107,59,0.3);
            color: #ff6b3b;
        }

        .profile-section-title:first-of-type {
            margin-top: 0;
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        .loading-spinner {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .floating-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 10px 20px;
            z-index: 1000;
            border: 1px solid rgba(255,107,59,0.3);
        }

        /* Главный экран */
        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-section {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .user-greeting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .greeting-text h2 {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .profile-badge {
            background: rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 6px 16px;
            text-align: center;
        }

        .profile-code {
            font-size: 12px;
            font-weight: 600;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(10,10,10,0.5);
            border-radius: 50px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            cursor: pointer;
        }

        .mode-btn.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .voice-card {
            background: linear-gradient(135deg, rgba(255,107,59,0.15), rgba(255,107,59,0.05));
            border-radius: 60px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid rgba(255,107,59,0.2);
            cursor: pointer;
        }

        .voice-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .voice-text {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .module-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
        }

        .module-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .module-name {
            font-weight: 600;
            font-size: 14px;
        }

        .module-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .quick-actions {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
        }

        .quick-actions-title {
            font-weight: 600;
            margin-bottom: 16px;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .quick-action {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }

        .action-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .action-name {
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .chats-panel {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                z-index: 100;
            }
            .chats-panel.open {
                left: 0;
            }
            .mobile-menu-btn {
                display: block;
            }
            .quick-actions-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            .action-name {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="appRoot">
        <div class="chats-panel" id="chatsPanel">
            <div class="chats-header">
                <div class="chats-title">FREDI</div>
            </div>
            <div class="chats-search">
                <input type="text" placeholder="Поиск" id="chatSearchInput">
            </div>
            <div class="chats-list" id="chatsList">
                <div class="chat-item active" data-chat="fredi">
                    <div class="chat-avatar">⭐</div>
                    <div class="chat-info">
                        <div class="chat-name">Фреди</div>
                        <div class="chat-preview">Чем могу помочь?</div>
                    </div>
                </div>
                <div class="chat-item" data-chat="test" id="testChatItem">
                    <div class="chat-avatar">📊</div>
                    <div class="chat-info">
                        <div class="chat-name">Психологический тест</div>
                        <div class="chat-preview">15 минут, 5 этапов</div>
                    </div>
                </div>
                <div class="menu-divider"></div>
                <div class="menu-section-title">РАСШИРЕННЫЕ ФУНКЦИИ</div>
                <div class="chat-item" data-chat="confinement">
                    <div class="chat-avatar">🔐</div>
                    <div class="chat-info">
                        <div class="chat-name">Модель ограничений</div>
                        <div class="chat-preview">Анализ паттернов</div>
                    </div>
                </div>
            </div>
            <div class="chats-footer">
                <div class="user-mini-profile" id="userMiniProfile">
                    <div class="user-mini-avatar" id="userMiniAvatar">А</div>
                    <div class="user-mini-info">
                        <div class="user-mini-name" id="userName">Пользователь</div>
                        <div class="user-mini-status">активен</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <div class="chat-header-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                    <div class="chat-header-avatar">⭐</div>
                    <div>
                        <div class="chat-header-name">Фреди</div>
                        <div class="chat-header-status">
                            <span class="mode-indicator"></span>
                            <span>Психолог</span>
                        </div>
                    </div>
                </div>
            </div>
            <div id="screenContainer" class="screen-container">
                <div class="loading-screen">
                    <div class="loading-spinner">⭐</div>
                    <div>Инициализация...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastMessage" class="floating-message" style="display: none;"></div>

    <script>
    // ============================================
    // КОНФИГУРАЦИЯ
    // ============================================
    const API_BASE_URL = 'https://fredi-backend-flz2.onrender.com';

    function getUserId() {
        let userId = localStorage.getItem('fredi_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('fredi_user_id', userId);
        }
        return userId;
    }

    const USER_ID = getUserId();
    console.log('👤 User ID:', USER_ID);

    // ============================================
    // ФУНКЦИИ ФОРМАТИРОВАНИЯ
    // ============================================
    
    function formatProfileText(text) {
        if (!text) return '📊 Данные не найдены. Пройдите тест, чтобы получить психологический портрет.';
        
        // Убираем маркдаун
        text = text.replace(/\*\*(.*?)\*\*/g, '$1');
        text = text.replace(/\*(.*?)\*/g, '$1');
        
        // Заголовки
        const headers = ['КЛЮЧЕВАЯ ХАРАКТЕРИСТИКА', 'СИЛЬНЫЕ СТОРОНЫ', 'ЗОНЫ РОСТА', 'КАК ЭТО СФОРМИРОВАЛОСЬ', 'ГЛАВНАЯ ЛОВУШКА'];
        const emojis = ['🔑', '💪', '🎯', '🌱', '⚠️'];
        
        headers.forEach((header, i) => {
            const regex = new RegExp(header, 'gi');
            text = text.replace(regex, `<div class="profile-section-title">${emojis[i]} ${header}</div>`);
        });
        
        // Форматируем списки
        text = text.replace(/•\s*/g, '<br>• ');
        text = text.replace(/-\s*/g, '<br>• ');
        text = text.replace(/\n\n/g, '<br><br>');
        text = text.replace(/\n/g, '<br>');
        
        return text;
    }

    // ============================================
    // API ВЫЗОВЫ
    // ============================================

    async function isTestCompleted() {
        try {
            const response = await fetch(`${API_BASE_URL}/api/user-status?user_id=${USER_ID}`);
            const data = await response.json();
            console.log('📊 Test status:', data);
            if (data.has_profile) return true;
            
            const stored = localStorage.getItem(`test_results_${USER_ID}`);
            if (stored) {
                const results = JSON.parse(stored);
                if (results.profile || results.aiProfile) return true;
            }
            return false;
        } catch (error) {
            console.error('Error checking test status:', error);
            return false;
        }
    }

    async function getAIGeneratedProfile() {
        console.log('📥 Запрос AI-профиля для:', USER_ID);
        try {
            const response = await fetch(`${API_BASE_URL}/api/generated-profile/${USER_ID}`);
            const data = await response.json();
            console.log('📥 Ответ API профиля:', data);
            
            if (data.success && data.ai_profile) {
                console.log('✅ AI-профиль получен, длина:', data.ai_profile.length);
                return data.ai_profile;
            }
            if (data.status === 'generating') {
                console.log('⏳ Профиль генерируется, ждём...');
                await new Promise(resolve => setTimeout(resolve, 3000));
                return getAIGeneratedProfile();
            }
            console.warn('⚠️ Профиль не найден');
            return null;
        } catch (error) {
            console.error('❌ Error fetching AI profile:', error);
            return null;
        }
    }

    // ============================================
    // UI ФУНКЦИИ
    // ============================================

    function showToast(message) {
        const toast = document.getElementById('toastMessage');
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    function showLoading(message) {
        const container = document.getElementById('screenContainer');
        container.innerHTML = `
            <div class="loading-screen">
                <div class="loading-spinner">🧠</div>
                <div>${message}</div>
            </div>
        `;
    }

    function renderDashboard() {
        const container = document.getElementById('screenContainer');
        const userName = localStorage.getItem('fredi_user_name') || 'друг';
        
        container.innerHTML = `
            <div class="dashboard-container">
                <div class="hero-section">
                    <div class="user-greeting">
                        <div class="greeting-text">
                            <h2>🧠 Привет, ${userName}!</h2>
                            <p>Я здесь, чтобы помочь разобраться в глубинных паттернах</p>
                        </div>
                        <div class="profile-badge">
                            <div class="profile-code" id="profileCode">🎭</div>
                            <div>ваш психотип</div>
                        </div>
                    </div>
                </div>
                
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="psychologist">🧠 ПСИХОЛОГ</button>
                </div>
                
                <div class="voice-card" id="voiceCard">
                    <div class="voice-icon">🎤</div>
                    <div class="voice-text">Расскажите, что вас беспокоит</div>
                </div>
                
                <div class="modules-grid">
                    <div class="module-card"><div class="module-icon">🧠</div><div class="module-name">Анализ</div><div class="module-desc">Глубинные паттерны</div></div>
                    <div class="module-card"><div class="module-icon">💭</div><div class="module-name">Эмоции</div><div class="module-desc">Работа с чувствами</div></div>
                    <div class="module-card"><div class="module-icon">🕊️</div><div class="module-name">Исцеление</div><div class="module-desc">Проработка опыта</div></div>
                    <div class="module-card"><div class="module-icon">💕</div><div class="module-name">Отношения</div><div class="module-desc">Коммуникация</div></div>
                </div>
                
                <div class="quick-actions">
                    <div class="quick-actions-title">⚡ Быстрые действия</div>
                    <div class="quick-actions-grid">
                        <div class="quick-action" data-action="profile">
                            <div class="action-icon">🧠</div>
                            <div class="action-name">Мой портрет</div>
                        </div>
                        <div class="quick-action" data-action="test">
                            <div class="action-icon">📊</div>
                            <div class="action-name">Пройти тест</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        // Обработчики
        document.querySelectorAll('.quick-action').forEach(el => {
            el.addEventListener('click', async () => {
                const action = el.dataset.action;
                if (action === 'profile') await handleProfileClick();
                if (action === 'test') startTest();
            });
        });
        
        document.querySelectorAll('.module-card').forEach(el => {
            el.addEventListener('click', () => showToast('Модуль скоро будет доступен'));
        });
        
        document.getElementById('voiceCard')?.addEventListener('click', () => {
            showToast('Голосовой ввод будет доступен в следующем обновлении');
        });
        
        // Проверяем статус теста
        isTestCompleted().then(completed => {
            const codeEl = document.getElementById('profileCode');
            if (completed && codeEl) {
                codeEl.textContent = '✨';
            }
        });
    }

    function showFullContentScreen(title, content) {
        const container = document.getElementById('screenContainer');
        console.log('📄 Показываем контент:', title, 'Длина:', content?.length);
        
        const formattedContent = formatProfileText(content);
        
        container.innerHTML = `
            <div class="full-content-page">
                <button class="back-btn" id="backBtn">◀️ НАЗАД</button>
                <div class="content-header">
                    <div class="content-emoji">🧠</div>
                    <h1>${title}</h1>
                </div>
                <div class="content-body">
                    ${formattedContent || 'Контент не найден'}
                </div>
            </div>
        `;
        
        const backBtn = document.getElementById('backBtn');
        if (backBtn) {
            backBtn.addEventListener('click', () => {
                console.log('🔙 Возврат на главный экран');
                renderDashboard();
            });
        }
    }

    async function handleProfileClick() {
        console.log('🖱️ Клик по "Мой портрет"');
        
        const completed = await isTestCompleted();
        console.log('Тест пройден:', completed);
        
        if (!completed) {
            showToast('📊 Сначала пройдите психологический тест');
            return;
        }
        
        showLoading('Загружаю психологический портрет...');
        
        const profile = await getAIGeneratedProfile();
        console.log('Полученный профиль:', profile ? `есть, длина ${profile.length}` : 'пусто');
        
        if (profile) {
            showFullContentScreen('Мой портрет', profile);
        } else {
            showFullContentScreen('Мой портрет', '🧠 Психологический портрет формируется. Подождите немного и попробуйте снова.\n\nЭто может занять до 30 секунд после завершения теста.');
        }
    }

    function startTest() {
        console.log('🖱️ Запуск теста');
        if (window.Test && window.Test.start) {
            window.Test.init(USER_ID);
            window.Test.start();
        } else {
            showToast('Тест загружается...');
            // Ждём загрузки test.js
            setTimeout(() => {
                if (window.Test && window.Test.start) {
                    window.Test.init(USER_ID);
                    window.Test.start();
                } else {
                    showToast('Ошибка загрузки теста, обновите страницу');
                }
            }, 2000);
        }
    }

    // ============================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================

    function initMobileMenu() {
        const mobileBtn = document.getElementById('mobileMenuBtn');
        const panel = document.getElementById('chatsPanel');
        if (mobileBtn && panel) {
            mobileBtn.addEventListener('click', () => {
                panel.classList.toggle('open');
            });
            document.addEventListener('click', (e) => {
                if (panel.classList.contains('open') && !panel.contains(e.target) && !mobileBtn.contains(e.target)) {
                    panel.classList.remove('open');
                }
            });
        }
    }

    function init() {
        console.log('🚀 FREDI запущен, User ID:', USER_ID);
        initMobileMenu();
        renderDashboard();
        
        // Запрос имени
        const userName = localStorage.getItem('fredi_user_name');
        if (!userName) {
            setTimeout(() => {
                const name = prompt('Как мне к вам обращаться?', '');
                if (name && name.trim()) {
                    localStorage.setItem('fredi_user_name', name.trim());
                    document.getElementById('userName').textContent = name;
                    document.getElementById('userMiniAvatar').textContent = name.charAt(0).toUpperCase();
                    renderDashboard();
                }
            }, 500);
        } else {
            document.getElementById('userName').textContent = userName;
            document.getElementById('userMiniAvatar').textContent = userName.charAt(0).toUpperCase();
        }
        
        // Обработчик теста в меню
        document.getElementById('testChatItem')?.addEventListener('click', () => startTest());
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
    
    <script src="/test.js"></script>
</body>
</html>
